name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reliability-gate:
    name: Reliability gate (PR tier)
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # AxiiDiarization is a LOCAL sibling package (../AxiiDiarization in
      # the project); CI must materialize it next to the workspace.
      - name: Checkout AxiiDiarization (local sibling package)
        run: git clone --depth 1 https://github.com/bwarzecha/AxiiDiarization.git ../AxiiDiarization

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Axii.xcodeproj \
            -scheme Axii

      # Unit + integration + both schedule fuzzers at in-suite sizes —
      # the same gate that used to run locally before every commit.
      # E2E stays local-only (needs BlackHole, Accessibility, a live
      # session); it is required before push for UI/capture changes.
      - name: Reliability gate (--pr)
        run: |
          AXII_SUITE_SKIP_E2E=1 AXII_SUITE_UNSIGNED=1 \
            Scripts/reliability-suite.sh --pr

      - name: Build (Release)
        run: |
          xcodebuild build \
            -project Axii.xcodeproj \
            -scheme Axii \
            -configuration Release \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO
